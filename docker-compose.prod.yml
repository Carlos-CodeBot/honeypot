version: '3.8'
services:
  honeypot-web:
    build: .
    container_name: honeypot-web
    env_file:
      - .env
    environment:
      - DB_PATH=/data/honeypot.db
      - TRAINING_FILE=${TRAINING_FILE:-/data/training_samples.txt}
      - MODEL_PATH=${MODEL_PATH:-/data/adaptive_model.joblib}
    volumes:
      - honeypot-data:/data
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: honeypot-nginx
    depends_on:
      - honeypot-web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  honeypot-data:
